name: ${PROJECT_NAME:-mqtt-project}

x-restart-policy: &restart_policy
  restart: unless-stopped

x-core-env: &core_env
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_KEY: ${APP_KEY}
  APP_URL: ${APP_URL}
  APP_LOCALE: ${APP_LOCALE:-en}
  APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
  APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-en_US}
  LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-core}
  DB_USERNAME: ${DB_USERNAME:-core}
  DB_PASSWORD: ${DB_PASSWORD}
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: ${SESSION_DRIVER:-redis}
  KAFKA_BROKERS: kafka:9092
  KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-core-packet-storage}
  KAFKA_PACKET_TOPIC: ${KAFKA_PACKET_TOPIC:-mqtt.events}
  KAFKA_OFFSET_RESET: ${KAFKA_OFFSET_RESET:-earliest}
  KAFKA_CONSUME_TIMEOUT_MS: ${KAFKA_CONSUME_TIMEOUT_MS:-1000}
  KAFKA_BATCH_SIZE: ${KAFKA_BATCH_SIZE:-500}
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_HTTP_PORT: 8123
  CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-core}
  CLICKHOUSE_USERNAME: ${CLICKHOUSE_USERNAME:-default}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
  CLICKHOUSE_PACKETS_TABLE: ${CLICKHOUSE_PACKETS_TABLE:-mqtt_packets}
  PACKET_DEVICE_TOPIC_REGEX: ${PACKET_DEVICE_TOPIC_REGEX:-~(?:^|/)devices?/([^/]+)~}
  BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-log}
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
  HORIZON_PATH: ${HORIZON_PATH:-horizon}
  TELESCOPE_ENABLED: ${TELESCOPE_ENABLED:-false}
  TELESCOPE_PATH: ${TELESCOPE_PATH:-telescope}
  TELESCOPE_DRIVER: ${TELESCOPE_DRIVER:-database}
  TELESCOPE_QUEUE_CONNECTION: ${TELESCOPE_QUEUE_CONNECTION:-redis}
  TELESCOPE_QUEUE: ${TELESCOPE_QUEUE:-telescope}
  MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL}
  MERCURE_INTERNAL_URL: http://mercure/.well-known/mercure
  MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_PUBLISHER_JWT_KEY}
  MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_SUBSCRIBER_JWT_KEY}
  MERCURE_JWT_ALGORITHM: ${MERCURE_JWT_ALGORITHM:-HS256}
  JWT_SECRET: ${JWT_SECRET}
  JWT_ISSUER: ${JWT_ISSUER}
  JWT_AUDIENCE: ${JWT_AUDIENCE}
  JWT_TTL_MINUTES: ${JWT_TTL_MINUTES:-60}
  JWT_REFRESH_TTL_MINUTES: ${JWT_REFRESH_TTL_MINUTES:-10080}
  JWT_LEEWAY_SECONDS: ${JWT_LEEWAY_SECONDS:-30}
  MAIL_MAILER: ${MAIL_MAILER:-log}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no-reply@example.com}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-MQTT}

services:
  core-php:
    <<: *restart_policy
    image: mqtt-project/core-php:${DEPLOY_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: deploy/core/Dockerfile
      target: php
    environment:
      <<: *core_env
      CONTAINER_ROLE: php-fpm
    volumes:
      - core-storage:/var/www/core/storage
      - core-cache:/var/www/core/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3

  core-worker:
    <<: *restart_policy
    image: mqtt-project/core-php:${DEPLOY_IMAGE_TAG:-local}
    environment:
      <<: *core_env
      CONTAINER_ROLE: worker
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/conf.d/core-worker.conf"]
    volumes:
      - core-storage:/var/www/core/storage
      - core-cache:/var/www/core/bootstrap/cache
    depends_on:
      core-php:
        condition: service_healthy

  core-nginx:
    <<: *restart_policy
    image: mqtt-project/core-nginx:${DEPLOY_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: deploy/core/Dockerfile
      target: nginx
    ports:
      - "${CORE_HTTP_PORT:-8080}:80"
    depends_on:
      core-php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  bus:
    <<: *restart_policy
    image: mqtt-project/bus:${DEPLOY_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: deploy/bus/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      BUS_ID: ${BUS_ID:-bus-prod-1}
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-bus-prod}
      MQTT_TOPIC: ${MQTT_TOPIC:-#}
      MQTT_QOS: ${MQTT_QOS:-1}
      MQTT_CLEAN_SESSION: ${MQTT_CLEAN_SESSION:-false}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-mqtt.events}
      KAFKA_BATCH_SIZE: ${KAFKA_BATCH_SIZE:-100}
      KAFKA_LINGER_MS: ${KAFKA_LINGER_MS:-100}
      KAFKA_MAX_OUTSTANDING: ${KAFKA_MAX_OUTSTANDING:-10000}
      KAFKA_BACKPRESSURE_TIMEOUT_MS: ${KAFKA_BACKPRESSURE_TIMEOUT_MS:-5000}
      KAFKA_MESSAGE_TIMEOUT_MS: ${KAFKA_MESSAGE_TIMEOUT_MS:-30000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_TIMEOUT: ${REDIS_TIMEOUT:-2.5}
      OUTBOX_STREAM: ${OUTBOX_STREAM:-mqtt:outbox}
      OUTBOX_GROUP: ${OUTBOX_GROUP:-bus-publishers}
      OUTBOX_CONSUMER: ${OUTBOX_CONSUMER:-}
      OUTBOX_BUS_ID: ${OUTBOX_BUS_ID:-}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-100}
      OUTBOX_MAX_LENGTH: ${OUTBOX_MAX_LENGTH:-100000}
      OUTBOX_DEDUPE_TTL_SECONDS: ${OUTBOX_DEDUPE_TTL_SECONDS:-86400}
      OUTBOX_BLOCK_MS: ${OUTBOX_BLOCK_MS:-1}
      BUS_STATUS_FILE: /var/www/bus/storage/runtime/status.json
      BUS_STATUS_INTERVAL_MS: ${BUS_STATUS_INTERVAL_MS:-1000}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_STORAGE: ${METRICS_STORAGE:-redis}
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-bus}
      METRICS_REDIS_PREFIX: ${METRICS_REDIS_PREFIX:-bus:prometheus:}
    ports:
      - "${BUS_HTTP_PORT:-8082}:8080"
    volumes:
      - bus-storage:/var/www/bus/storage
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      mosquitto:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    <<: *restart_policy
    image: mqtt-project/frontend:${DEPLOY_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: deploy/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${FRONTEND_HTTP_PORT:-8081}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  mercure:
    <<: *restart_policy
    image: dunglas/mercure:v0.18
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_PUBLISHER_JWT_KEY}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_SUBSCRIBER_JWT_KEY}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins *
        anonymous
    ports:
      - "${MERCURE_HTTP_PORT:-1337}:80"

  postgres:
    <<: *restart_policy
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-core}
      POSTGRES_USER: ${POSTGRES_USER:-core}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-core} -d ${POSTGRES_DB:-core}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *restart_policy
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    <<: *restart_policy
    image: clickhouse/clickhouse-server:25.4-alpine
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-core}
      CLICKHOUSE_USER: ${CLICKHOUSE_USERNAME:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep Ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    <<: *restart_policy
    image: bitnami/zookeeper:3.9
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    volumes:
      - zookeeper-data:/bitnami/zookeeper

  kafka:
    <<: *restart_policy
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    depends_on:
      - zookeeper

  mosquitto:
    <<: *restart_policy
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data

volumes:
  core-storage:
  core-cache:
  bus-storage:
  postgres-data:
  redis-data:
  clickhouse-data:
  zookeeper-data:
  kafka-data:
  mosquitto-data:
