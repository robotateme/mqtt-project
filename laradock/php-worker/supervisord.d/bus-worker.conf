[program:bus-worker]
process_name=%(program_name)s_%(process_num)02d
command=/bin/sh -lc "cd /var/www/bus && exec php bin/bus mqtt:consume"
autostart=true
autorestart=true
startsecs=5
startretries=10
stopwaitsecs=30
numprocs=1
user=laradock
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
